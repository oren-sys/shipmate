# ============================================
# Cloud Build - ShipMate Next.js App
# ============================================
# Triggered on push to master branch
# Steps: install → lint → type-check → build → Docker → deploy
# ============================================

steps:
  # Step 1: Install dependencies
  - name: "node:20-slim"
    id: "install"
    entrypoint: "npm"
    args: ["ci"]

  # Step 2: Type check
  - name: "node:20-slim"
    id: "typecheck"
    entrypoint: "npx"
    args: ["tsc", "--noEmit"]
    waitFor: ["install"]

  # Step 3: Build Next.js
  - name: "node:20-slim"
    id: "build"
    entrypoint: "npm"
    args: ["run", "build"]
    env:
      - "NODE_ENV=production"
      - "NEXT_TELEMETRY_DISABLED=1"
      - "NEXT_PUBLIC_BASE_URL=https://shipmate.store"
      - "NEXT_PUBLIC_GA4_ID=G-6YQSMHJEKP"
    waitFor: ["typecheck"]

  # Step 4: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-build"
    args:
      - "build"
      - "-t"
      - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate:$SHORT_SHA"
      - "-t"
      - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate:latest"
      - "."
    waitFor: ["build"]

  # Step 5: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push"
    args:
      - "push"
      - "--all-tags"
      - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate"
    waitFor: ["docker-build"]

  # Step 6: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "shipmate"
      - "--image"
      - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate:$SHORT_SHA"
      - "--region"
      - "me-west1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--concurrency"
      - "80"
      - "--timeout"
      - "300"
      - "--set-env-vars"
      - "NODE_ENV=production,NEXT_PUBLIC_BASE_URL=https://shipmate.store,NEXT_PUBLIC_GA4_ID=G-6YQSMHJEKP,GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
      - "--set-secrets"
      - "NEXTAUTH_SECRET=nextauth-secret:latest,MESHULAM_API_KEY=meshulam-api-key:latest,MESHULAM_PAGE_CODE=meshulam-page-code:latest,WHATSAPP_API_TOKEN=whatsapp-api-token:latest,WHATSAPP_PHONE_ID=whatsapp-phone-id:latest,ALIEXPRESS_APP_KEY=aliexpress-app-key:latest,ALIEXPRESS_APP_SECRET=aliexpress-app-secret:latest,ADMIN_EMAIL=admin-email:latest,ADMIN_PASSWORD=admin-password:latest"
    waitFor: ["docker-push"]

# Build images
images:
  - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate:$SHORT_SHA"
  - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate:latest"

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

# Timeout for the entire build
timeout: "1200s"

# Substitutions
substitutions:
  _REGION: "me-west1"
