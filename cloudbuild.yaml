# ============================================
# Cloud Build - ShipMate Next.js App
# ============================================
# Triggered on push to master branch
# Steps: Docker build → push → deploy to Cloud Run
# (npm install + build happen inside the Dockerfile multi-stage build)
# ============================================

steps:
  # Step 1: Build Docker image (includes npm install + next build)
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-build"
    args:
      - "build"
      - "-t"
      - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate:latest"
      - "."

  # Step 2: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push"
    args:
      - "push"
      - "--all-tags"
      - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate"
    waitFor: ["docker-build"]

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "shipmate"
      - "--image"
      - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate:latest"
      - "--region"
      - "me-west1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
    waitFor: ["docker-push"]

# Build images
images:
  - "me-west1-docker.pkg.dev/$PROJECT_ID/shipmate/shipmate:latest"

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

# Timeout for the entire build
timeout: "1200s"
